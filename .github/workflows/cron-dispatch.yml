name: Check Dispatch

on:
  schedule:
    # Every 5 minutes — GitHub Actions minimum interval.
    # Monitors with a 1-minute interval will be checked at most every 5 minutes.
    - cron: '*/5 * * * *'

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger check dispatch
        run: |
          curl --fail \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.LOCALHOST_URL }}/api/internal/checks/dispatch"
